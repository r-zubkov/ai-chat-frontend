<tui-root tuiTheme="dark">
  <div class="app-root flex" [class.mobile]="appService.isMobile()">
    @if (appService.sidebarOpen()) {
      <aside class="sidebar">
        <app-sidebar></app-sidebar>
      </aside>
    }
    <div class="app-body flex flex-1 flex-col">
      <app-header></app-header>

      <main class="chat-container flex flex-1 justify-center">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</tui-root>
