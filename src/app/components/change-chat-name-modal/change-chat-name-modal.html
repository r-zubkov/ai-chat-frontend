 <form>
  <tui-textfield>
    <input
        name="name"
        tuiAutoFocus
        tuiTextfield
        [(ngModel)]="value"
    />
  </tui-textfield>
  <footer>
    <button
      appearance="secondary"
      tuiButton
      type="button"
      (click)="context.$implicit.complete()"
    >
      Отмена
    </button>
    <button
      tuiButton
      type="submit"
    >
      Сохранить
    </button>
  </footer>
</form>
