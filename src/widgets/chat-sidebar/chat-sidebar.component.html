<div class="sidebar-root flex flex-col h-full">
  <div class="sidebar-list sidebar-header">
    <a
      class="sidebar-list__btn sidebar-action-btn sidebar-new-btn"
      [routerLink]="['/chats', 'new']"
    >
      <tui-icon icon="@tui.message-circle-plus" [style.font-size.rem]="1" />
      <span>Новый чат</span>
    </a>
  </div>

  <tui-scrollbar class="flex-1">
    <div class="sidebar-list">
      @for (chat of chatStore.chats(); track chat.id) {
        <div
          class="sidebar-chat sidebar-list__btn sidebar-list__btn--inner-padding flex items-center items-stretch gap-3"
          [class.sidebar-list__btn--active]="chat.id === chatStore.activeChatId()"
        >
          <a
            class="sidebar-chat__link flex items-center gap-3 min-width-0 flex-auto"
            [routerLink]="['/chats', chat.id]"
          >
            @if (chat.state === ChatState.THINKING) {
              <tui-loader [inheritColor]="true" />
            }

            <div class="min-width-0 flex-1">
              <div class="sidebar-chat__title truncate">
                {{ chat.title }}
              </div>
              <div class="sidebar-chat__model opacity-60 truncate">
                {{ chat.lastUpdate | date: 'dd.MM.yy HH:mm' }} • {{ chat.model | modelLabel }}
              </div>
            </div>
          </a>

          <button
            class="sidebar-chat__action items-center cursor-pointer"
            type="button"
            [class.dropdown-open]="isItemOptionsDropdownOpen(chat.id)"
            tuiActiveZone
            tuiDropdownAlign="right"
            [tuiDropdownSided]="true"
            [tuiDropdown]="dropdownItemOptionsContent"
            [tuiDropdownManual]="isItemOptionsDropdownOpen(chat.id)"
            [tuiObscuredEnabled]="isItemOptionsDropdownOpen(chat.id)"
            (click)="handleOpenItemOptionsDropdown(chat.id)"
            (tuiActiveZoneChange)="onActiveZone($event)"
            (tuiObscured)="onObscured($event)"
          >
            <tui-icon icon="@tui.ellipsis-vertical" [style.font-size.rem]="1" />

            <ng-template #dropdownItemOptionsContent>
              <tui-data-list class="action-list--compact-spacing">
                <button tuiOption new type="button" (click)="handleRenameChat(chat)">
                  <tui-icon icon="@tui.pencil" [style.font-size.rem]="1" />
                  <span>Переименовать</span>
                </button>
                <button
                  class="tui-text-danger"
                  tuiOption
                  new
                  type="button"
                  (click)="handleDeleteChat(chat)"
                >
                  <tui-icon icon="@tui.trash-2" [style.font-size.rem]="1" />
                  <span>Удалить</span>
                </button>
              </tui-data-list>
            </ng-template>
          </button>
        </div>
      }

      @if (chatStore.hasMoreChats()) {
        <button
          type="button"
          class="sidebar-list__btn sidebar-action-btn sidebar-load-more-btn"
          [disabled]="isLoadingMoreChats()"
          (click)="handleLoadMoreChats()"
        >
          @if (isLoadingMoreChats()) {
            <tui-loader [inheritColor]="true" />
          }
          <span>Показать ещё</span>
        </button>
      }
    </div>
  </tui-scrollbar>

  <div class="sidebar-list sidebar-footer">
    @if (chatStore.chatsCount()) {
      <button
        type="button"
        class="sidebar-list__btn sidebar-action-btn"
        (click)="handleOpenClearConfirmationModal()"
      >
        <tui-icon icon="@tui.brush-cleaning" [style.font-size.rem]="1" />
        <span>Очистить историю</span>
      </button>
    }
  </div>
</div>
